<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found · shinn.life</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --fg: #f0ece3;
    --accent: #e8d5a3;
    --dim: #3a3a3a;
    --mid: #888;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Syne', sans-serif;
    overflow: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    opacity: 0.5;
  }

  /* Subtle radial glow */
  body::after {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(232,213,163,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: grid;
    place-items: center;
    padding: 2rem;
  }

  .inner {
    text-align: center;
    max-width: 560px;
  }

  /* Big 404 */
  .four-oh-four {
    position: relative;
    display: inline-block;
    font-size: clamp(7rem, 22vw, 14rem);
    font-weight: 800;
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: transparent;
    -webkit-text-stroke: 1px var(--dim);
    user-select: none;
    animation: fadeIn 0.9s ease both;
  }

  .four-oh-four::after {
    content: '404';
    position: absolute;
    inset: 0;
    color: var(--fg);
    -webkit-text-stroke: 0;
    clip-path: inset(0 0 55% 0);
    opacity: 0.08;
  }

  /* Glitch flicker on the 0 */
  .glitch {
    display: inline-block;
    animation: glitch 4s 1.5s ease-in-out infinite;
  }

  @keyframes glitch {
    0%, 90%, 100% { transform: none; opacity: 1; }
    91%  { transform: translateX(-3px) skewX(-5deg); opacity: 0.8; }
    93%  { transform: translateX(3px) skewX(5deg); color: var(--accent); }
    95%  { transform: none; opacity: 1; }
    97%  { transform: translateX(-2px); color: var(--fg); }
  }

  .mono-label {
    font-family: 'Syne Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
    animation: fadeIn 0.9s 0.2s ease both;
    opacity: 0;
  }

  .headline {
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    font-weight: 700;
    color: var(--fg);
    margin-top: 1.2rem;
    animation: fadeIn 0.9s 0.35s ease both;
    opacity: 0;
  }

  .subtext {
    margin-top: 0.75rem;
    font-size: 0.88rem;
    color: var(--mid);
    font-weight: 400;
    line-height: 1.7;
    animation: fadeIn 0.9s 0.5s ease both;
    opacity: 0;
  }

  /* Divider */
  .divider {
    width: 40px;
    height: 1px;
    background: var(--dim);
    margin: 2rem auto;
    animation: expandLine 0.8s 0.65s ease both;
    transform-origin: center;
  }

  @keyframes expandLine {
    from { transform: scaleX(0); opacity: 0; }
    to   { transform: scaleX(1); opacity: 1; }
  }

  /* CTA Button */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    text-decoration: none;
    color: var(--bg);
    background: var(--fg);
    padding: 0.75rem 1.8rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: background 0.25s, color 0.25s, transform 0.2s, box-shadow 0.25s;
    animation: fadeIn 0.9s 0.75s ease both;
    opacity: 0;
    position: relative;
    overflow: hidden;
  }

  .cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-101%);
    transition: transform 0.3s ease;
  }

  .cta:hover::before { transform: translateX(0); }

  .cta:hover {
    color: var(--bg);
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(232,213,163,0.2);
  }

  .cta span, .cta svg { position: relative; z-index: 1; }

  .arrow {
    transition: transform 0.25s ease;
  }

  .cta:hover .arrow { transform: translateX(4px); }

  /* Domain hint */
  .domain {
    margin-top: 1.5rem;
    font-family: 'Syne Mono', monospace;
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    animation: fadeIn 0.9s 0.9s ease both;
    opacity: 0;
  }

  .domain a {
    color: var(--dim);
    text-decoration: none;
    transition: color 0.2s;
  }

  .domain a:hover { color: var(--mid); }

  /* Corner decoration */
  .corner {
    position: fixed;
    font-family: 'Syne Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--dim);
    animation: fadeIn 1s 1s ease both;
    opacity: 0;
  }

  .corner-tl { top: 1.8rem; left: 2rem; }
  .corner-br { bottom: 1.8rem; right: 2rem; text-align: right; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Scanning line */
  .scanline {
    position: fixed;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(232,213,163,0.15), transparent);
    animation: scan 6s linear infinite;
    pointer-events: none;
  }

  @keyframes scan {
    from { top: -2px; }
    to   { top: 100vh; }
  }
</style>
</head>
<body>

<div class="scanline"></div>

<span class="corner corner-tl">SHINN.LIFE</span>
<span class="corner corner-br">ERROR · NOT FOUND</span>

<div class="wrapper">
  <div class="inner">
    <div class="mono-label">Error · HTTP Status</div>

    <div class="four-oh-four">
      4<span class="glitch">0</span>4
    </div>

    <div class="headline">Page not found.</div>

    <p class="subtext">
      The page you're looking for doesn't exist,<br>
      was moved, or never existed to begin with.
    </p>

    <div class="divider"></div>

    <a href="https://www.shinn.life" class="cta">
      <span>Back to Home</span>
      <svg class="arrow" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M1 7h12M8 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

    <div class="domain">
      <a href="https://www.shinn.life">www.shinn.life</a>
    </div>
  </div>
</div>

</body>
</html>
